version: "2"
sql:
  - engine: "postgresql"
    schema:
      - "auth/db/gen/schema.sql"
    queries:
      - "auth/db/queries.sql"
    gen:
      go:
        package: "authdb"
        out: "auth/db/gen"
        sql_package: "pgx/v5"
        emit_json_tags: true
        emit_interface: true
        emit_exact_table_names: false
