version: "2"
sql:
  - engine: "sqlite"
    schema:
      - "auth/db/gen/schema.sql"
    queries:
      - "auth/db/queries.sql"
    gen:
      go:
        package: "authdb"
        out: "auth/db/gen"
        emit_json_tags: true
        emit_interface: true
        emit_exact_table_names: false
        overrides:
          - db_type: "uuid"
            go_type:
              type: "UUID"
          - db_type: "uuid"
            nullable: true
            go_type:
              type: "UUID"
