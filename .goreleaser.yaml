version: 2

project_name: scenery

before:
  hooks:
    - ./scripts/build-dashboard-ui-embed.sh

builds:
  - id: scenery
    main: ./cmd/scenery
    binary: scenery
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
    goarch:
      - arm64
    flags:
      - -trimpath
    ldflags:
      - >-
        -s -w
        -X main.sceneryVersion={{ .Version }}
        -X main.sceneryCommit={{ .Commit }}
        -X main.sceneryBuiltAt={{ .Date }}
    mod_timestamp: "{{ .CommitTimestamp }}"

archives:
  - id: scenery
    ids:
      - scenery
    formats:
      - tar.gz
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    files:
      - LICENSE
      - README.md

checksum:
  name_template: checksums.txt

snapshot:
  version_template: "{{ incpatch .Version }}-next"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^tests:"
      - "^ci:"
      - "^chore:"

release:
  github:
    owner: scenery-sh
    name: scenery
