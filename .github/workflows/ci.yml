name: CI

"on":
  pull_request:
  push:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  go:
    name: Go
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2.2.0
        with:
          bun-version: 1.3.14

      - name: Check formatting
        run: |
          files="$(gofmt -l $(git ls-files '*.go'))"
          if [ -n "$files" ]; then
            echo "$files"
            exit 1
          fi

      - name: Test
        run: go test ./...

      - name: Check basic fixture app
        run: go run ./cmd/scenery check --app-root testdata/apps/basic --json

      - name: Build dashboard embed
        run: ./scripts/build-dashboard-ui-embed.sh

      - name: Clean install
        run: go install ./cmd/scenery

      - name: Smoke installed binary
        run: $(go env GOPATH)/bin/scenery version --json

  ui:
    name: UI
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2.2.0
        with:
          bun-version: 1.3.14

      - name: Install dashboard dependencies
        working-directory: ui
        run: bun install --frozen-lockfile

      - name: Typecheck dashboard
        working-directory: ui
        run: bun run typecheck

      - name: Test dashboard
        working-directory: ui
        run: bun run test

      - name: Build dashboard
        working-directory: ui
        run: bun run build

  self-harness:
    name: Self Harness
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2.2.0
        with:
          bun-version: 1.3.14

      - name: Install dashboard dependencies
        working-directory: ui
        run: bun install --frozen-lockfile

      - name: Install Scenery
        run: go install ./cmd/scenery

      - name: Run self harness
        run: $(go env GOPATH)/bin/scenery harness self --json --write
